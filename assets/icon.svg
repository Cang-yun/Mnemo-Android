<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#607888"/>
      <stop offset="100%" stop-color="#3A5060"/>
    </linearGradient>
  </defs>
  <!-- background: rounded square -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- open notebook / card -->
  <g transform="translate(512,480)" fill="none" stroke="#F2F3F5" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- left page -->
    <rect x="-200" y="-220" width="200" height="440" rx="12" fill="rgba(255,255,255,0.12)"/>
    <!-- right page -->
    <rect x="0" y="-220" width="200" height="440" rx="12" fill="rgba(255,255,255,0.18)"/>
    <!-- center fold line -->
    <line x1="0" y1="-220" x2="0" y2="220"/>
  </g>
  <!-- circular arrow (review cycle) -->
  <g transform="translate(512,580)" fill="none" stroke="#E2E8EC" stroke-width="28" stroke-linecap="round">
    <path d="M-80,-30 A90,90 0 1,1 80,30" stroke-dasharray="180 400"/>
    <polyline points="-90,-20 -70,-42 -48,-25" fill="none"/>
  </g>
  <!-- small spark / memory dot -->
  <circle cx="512" cy="380" r="40" fill="#E2E8EC" opacity="0.9"/>
  <circle cx="512" cy="380" r="18" fill="#607888" opacity="0.6"/>
</svg>
